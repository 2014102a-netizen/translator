<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Переводчик с AI на человеческий</title>
<style>
:root {
  --dark: #0E1420;
  --navy: #141B2D;
  --orange: #E8622B;
  --orange-dim: #C04E1F;
  --teal: #0891B2;
  --green: #059669;
  --purple: #A855F7;
  --yellow: #EAB308;
  --red: #EF4444;
  --white: #FFFFFF;
  --gray-light: #CBD5E1;
  --gray-mid: #475569;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--dark); font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:var(--white); overflow:hidden; user-select:none; }

/* ── HEADER ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:14px 20px 10px; background:var(--dark);
}
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.guild-badge { background:var(--orange); color:white; font-size:10px; font-weight:700; letter-spacing:1.5px; padding:4px 10px; border-radius:4px; }
.counter { font-size:13px; color:var(--gray-mid); font-weight:600; }
.counter span { color:var(--orange); }
.progress-bar-wrap { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--orange),#FF8C5A); border-radius:2px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1); }

/* ── STAGE ── */
.stage {
  position:fixed; top:80px; bottom:96px;
  left:0; right:0; display:flex; align-items:center; justify-content:center; padding:0 16px;
}
.card-wrapper { width:100%; max-width:420px; height:100%; perspective:1200px; }

/* ── FLIP CARD ── */
.card {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d;
  transition:transform 0.55s cubic-bezier(0.4,0.2,0.2,1);
  border-radius:20px; cursor:pointer;
}
.card.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; inset:0; border-radius:20px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  display:flex; flex-direction:column; padding:24px 22px 20px; overflow:hidden;
}
.card-front {
  background:#1A2235;
  border:1.5px solid rgba(232,98,43,0.25);
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
.card-front::before {
  content:''; position:absolute; top:-80px; right:-60px;
  width:200px; height:200px;
  background:radial-gradient(circle,rgba(232,98,43,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.card-back {
  background:#0F2218;
  border:1.5px solid rgba(5,150,105,0.25);
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
  transform:rotateY(180deg);
}
.card-back::before {
  content:''; position:absolute; bottom:-60px; left:-60px;
  width:200px; height:200px;
  background:radial-gradient(circle,rgba(5,150,105,0.1) 0%,transparent 70%);
  pointer-events:none;
}

/* Card labels */
.card-label { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.card-label-dot { width:8px; height:8px; border-radius:50%; }
.card-label-text { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.front-dot { background:var(--orange); } .front-text { color:var(--orange); }
.back-dot  { background:var(--green);  } .back-text  { color:var(--green);  }

/* Category tag */
.cat-tag {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600;
  letter-spacing:0.5px; margin-bottom:14px; width:fit-content;
}
.cat-field   { background:rgba(8,145,178,0.15);   color:var(--teal);   }
.cat-general { background:rgba(168,85,247,0.15);  color:var(--purple); }
.cat-meta    { background:rgba(234,179,8,0.15);   color:var(--yellow); }
.cat-provoke { background:rgba(239,68,68,0.15);   color:var(--red);    }

/* Front text */
.quote-box { flex:1; display:flex; flex-direction:column; justify-content:center; }
.quote-mark { font-size:44px; line-height:1; color:var(--orange); opacity:0.35; font-family:Georgia,serif; margin-bottom:-6px; display:block; }
.quote-text { font-size:clamp(15px,3.8vw,19px); line-height:1.55; color:var(--white); }
.quote-role { margin-top:16px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--gray-mid); }
.quote-role-bar { width:20px; height:2px; background:var(--orange); border-radius:1px; flex-shrink:0; }

/* Back text */
.back-main { flex:1; display:flex; flex-direction:column; justify-content:center; }
.back-quote-mark { font-size:36px; line-height:1; color:var(--green); opacity:0.35; font-family:Georgia,serif; margin-bottom:-4px; display:block; }
.back-text-content { font-size:clamp(14px,3.6vw,17px); line-height:1.62; color:#D1FAE5; }
.back-source { margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.07); font-size:11px; color:var(--gray-mid); font-style:italic; }

/* Flip hint */
.flip-hint {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,0.18); white-space:nowrap;
  display:flex; align-items:center; gap:5px;
  transition:opacity 0.3s;
}
.card.flipped .flip-hint { opacity:0; pointer-events:none; }

/* Scoring buttons — appear on back */
.score-buttons {
  position:absolute; bottom:14px; left:18px; right:18px;
  display:flex; gap:10px;
  opacity:0; pointer-events:none;
  transition:opacity 0.3s 0.3s;
}
.card.flipped .score-buttons { opacity:1; pointer-events:auto; }
.score-btn {
  flex:1; height:40px; border:none; border-radius:10px;
  font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:5px;
  transition:transform 0.15s;
}
.score-btn:active { transform:scale(0.95); }
.score-yes { background:rgba(5,150,105,0.2); color:#6EE7B7; border:1px solid rgba(5,150,105,0.35); }
.score-no  { background:rgba(239,68,68,0.15); color:#FCA5A5; border:1px solid rgba(239,68,68,0.25); }

/* ── INTRO CARD ── */
.intro-card {
  width:100%; height:100%; border-radius:20px; overflow:hidden;
  display:flex; flex-direction:column; padding:28px 24px 24px;
  background:var(--navy); border:1.5px solid rgba(255,255,255,0.07);
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
.intro-card.title-card { background:linear-gradient(145deg,#141B2D 0%,#1A1228 100%); border-color:rgba(232,98,43,0.3); }
.intro-top { margin-bottom:auto; }
.intro-eyebrow { font-size:10px; font-weight:700; letter-spacing:2.5px; color:var(--orange); margin-bottom:20px; display:block; }
.intro-title { font-size:clamp(26px,7vw,36px); font-weight:800; line-height:1.15; margin-bottom:12px; }
.intro-title .accent { color:var(--orange); }
.intro-subtitle { font-size:14px; color:var(--gray-mid); line-height:1.6; }
.intro-body { font-size:clamp(14px,3.5vw,16px); line-height:1.7; color:#94A3B8; flex:1; display:flex; flex-direction:column; justify-content:center; }
.intro-body strong { color:var(--white); font-weight:600; }
.intro-body .highlight { color:var(--orange); font-weight:600; }
.intro-body .highlight-green { color:#6EE7B7; font-weight:600; }
.intro-footer { margin-top:20px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.06); font-size:11px; color:var(--gray-mid); }
.intro-tap-hint { font-size:12px; color:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:flex-end; gap:5px; margin-top:16px; }
.steps-list { list-style:none; display:flex; flex-direction:column; gap:14px; }
.step { display:flex; align-items:flex-start; gap:12px; }
.step-num { width:26px; height:26px; border-radius:50%; background:rgba(232,98,43,0.15); border:1px solid rgba(232,98,43,0.3); color:var(--orange); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.step-text { font-size:14px; line-height:1.55; color:#94A3B8; }
.step-text strong { color:var(--white); }

/* ── NAVIGATION ── */
.nav {
  position:fixed; bottom:0; left:0; right:0;
  padding:12px 20px 24px;
  background:linear-gradient(to top,var(--dark) 70%,transparent);
  display:flex; align-items:center; gap:12px;
}
.nav-btn {
  flex:1; height:48px; border:none; border-radius:12px;
  font-size:15px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.2s;
}
.nav-btn:active { transform:scale(0.96); }
.nav-prev { background:rgba(255,255,255,0.06); color:var(--gray-light); }
.nav-prev:hover { background:rgba(255,255,255,0.1); }
.nav-next { background:var(--orange); color:white; box-shadow:0 4px 20px rgba(232,98,43,0.35); }
.nav-next:hover { background:var(--orange-dim); }
.nav-btn:disabled { opacity:0.25; pointer-events:none; }

/* ── DONE SCREEN ── */
.done-screen {
  display:none; position:fixed; inset:0; background:var(--dark);
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px; text-align:center;
}
.done-screen.visible { display:flex; }
.score-ring {
  width:120px; height:120px; border-radius:50%;
  background:conic-gradient(var(--orange) var(--pct), rgba(255,255,255,0.07) 0);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:24px; position:relative;
}
.score-ring::before {
  content:''; position:absolute; inset:8px; border-radius:50%; background:var(--dark);
}
.score-num { position:relative; font-size:28px; font-weight:800; }
.score-num span { font-size:14px; color:var(--gray-mid); }
.done-title { font-size:22px; font-weight:700; margin-bottom:10px; }
.done-sub { font-size:14px; color:var(--gray-mid); line-height:1.65; max-width:300px; margin-bottom:28px; }
.done-sub .done-hi { color:var(--green); font-weight:600; }
.done-sub .done-lo { color:var(--orange); font-weight:600; }
.done-actions { display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; }
.done-tg {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:rgba(8,145,178,0.12); color:var(--teal);
  border:1px solid rgba(8,145,178,0.3);
  padding:13px 20px; border-radius:12px;
  text-decoration:none; font-size:14px; font-weight:600;
}
.done-restart {
  background:var(--orange); color:white; border:none;
  padding:14px; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer;
}

/* Slide animation */
@keyframes sldR { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
@keyframes sldL { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
.anim-r { animation:sldR 0.32s cubic-bezier(0.4,0,0.2,1); }
.anim-l { animation:sldL 0.32s cubic-bezier(0.4,0,0.2,1); }
</style>
</head>

    source:'Мультикейсовое исследование гильдии «Труд и AI», ИТМО 2026' },
  { cat:'cat-provoke', catLabel:'Провокация',
    front:'Менеджер продаст диспетчер задач директору, а прораб скажет «у меня и так всё работает» — и система умрёт через месяц. Так ли это?',
    role:'Обсудите с соседом за столом',
    back:'Это не гипотеза — это наблюдение из поля. Организация декларирует использование AI без реального изменения практик. Мы называем это «мимикрией внедрения».',
    source:'Концепт гильдии · Pache & Santos 2013, selective decoupling' }

// ── STATE ──────────────────────────────────────────────────
const N_GENERAL = 5;
const SCORED = GAME.slice(N_GENERAL);
const GENERAL_CARDS = GAME.slice(0, N_GENERAL);
const IDX_GENERAL_START = INTRO.length;
const IDX_MID = INTRO.length + N_GENERAL;
const IDX_SCORED_START = IDX_MID + 1;
const TOTAL = INTRO.length + N_GENERAL + 1 + SCORED.length;

let cur = 0;
let flipped = false;
let score = 0;
let answered = new Array(SCORED.length).fill(null);

// ── RENDER ──────────────────────────────────────────────────
function render(dir) {
  flipped = false;
  const wrapper = document.getElementById('cardWrapper');
  wrapper.classList.remove('anim-r','anim-l');
  void wrapper.offsetWidth;
  if (dir) wrapper.classList.add(dir === 'next' ? 'anim-r' : 'anim-l');

  if (cur < INTRO.length) {
    renderIntro(INTRO[cur]);
  } else if (cur < IDX_MID) {
    renderGeneral(GENERAL_CARDS[cur - IDX_GENERAL_START]);
  } else if (cur === IDX_MID) {
    renderIntro(MID_INTRO);
  } else {
    renderScored(SCORED[cur - IDX_SCORED_START]);
  }

  document.getElementById('cur').textContent = cur + 1;
  document.getElementById('total').textContent = TOTAL;
  document.getElementById('progress').style.width = ((cur + 1) / TOTAL * 100) + '%';

  document.getElementById('prevBtn').disabled = cur === 0;
  const isLast = cur === TOTAL - 1;
  document.getElementById('nextBtn').textContent = isLast ? 'Завершить ✓' : 'Дальше →';

  const isScored = cur >= IDX_SCORED_START;
  if (isScored && answered[cur - IDX_SCORED_START] === null) {
    document.getElementById('nextBtn').disabled = true;
  } else {
    document.getElementById('nextBtn').disabled = false;
  }
}

function renderIntro(d) {
  const wrapper = document.getElementById('cardWrapper');
  wrapper.innerHTML = `
    <div class="intro-card ${d.style || ''}" onclick="next()">
      <div class="intro-top">
        <span class="intro-eyebrow">${d.eyebrow}</span>
        <div class="intro-title">${d.title.replace(/\n/g,'<br>')}</div>
        ${d.subtitle ? `<div class="intro-subtitle">${d.subtitle.replace(/\n/g,'<br>')}</div>` : ''}
      </div>
      ${d.body ? `<div class="intro-body" style="margin-top:20px">${d.body}</div>` : ''}
      ${d.footer ? `<div class="intro-footer">${d.footer}</div>` : ''}
      <div class="intro-tap-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        нажми, чтобы продолжить
      </div>
    </div>`;
}

function renderGeneral(c) {
  const wrapper = document.getElementById('cardWrapper');
  wrapper.innerHTML = `
    <div class="card ${flipped ? 'flipped' : ''}" id="card" onclick="handleCardTap()">
      <div class="card-face card-front">
        <div class="card-label">
          <div class="card-label-dot front-dot"></div>
          <div class="card-label-text front-text">Что говорит интегратор</div>
        </div>
        <div class="cat-tag ${c.cat}">${c.catLabel}</div>
        <div class="quote-box">
          <span class="quote-mark">"</span>
          <div class="quote-text">${c.front}</div>
          <div class="quote-role"><div class="quote-role-bar"></div><span>${c.role}</span></div>
        </div>
        <div class="flip-hint">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          переверни, чтобы узнать перевод
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">
          <div class="card-label-dot back-dot"></div>
          <div class="card-label-text back-text">На человеческом языке</div>
        </div>
        <div class="back-main">
          <span class="back-quote-mark">"</span>
          <div class="back-text-content">${c.back}</div>
        </div>
        <div class="back-source">${c.source}</div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);text-align:center;font-size:12px;color:rgba(255,255,255,0.3)">
          раунд 1 · счёт не считается · жми «Дальше»
        </div>
      </div>
    </div>`;
}

function renderScored(c) {
  const idx = cur - IDX_SCORED_START;
  const done = answered[idx] !== null;
  const wrapper = document.getElementById('cardWrapper');
  wrapper.innerHTML = `
    <div class="card ${flipped ? 'flipped' : ''}" id="card" onclick="handleCardTap()">
      <div class="card-face card-front">
        <div class="card-label">
          <div class="card-label-dot front-dot"></div>
          <div class="card-label-text front-text">Угадай реакцию сотрудника</div>
        </div>
        <div class="cat-tag ${c.cat}">${c.catLabel}</div>
        <div class="quote-box">
          <span class="quote-mark">"</span>
          <div class="quote-text">${c.front}</div>
          <div class="quote-role"><div class="quote-role-bar"></div><span>${c.role}</span></div>
        </div>
        <div class="flip-hint">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          подумай — потом переворачивай
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">
          <div class="card-label-dot back-dot"></div>
          <div class="card-label-text back-text">Реальная реакция из интервью</div>
        </div>
        <div class="back-main">
          <span class="back-quote-mark">"</span>
          <div class="back-text-content">${c.back}</div>
        </div>
        <div class="back-source">${c.source}</div>
        ${done ? `
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);text-align:center;font-size:12px;color:${answered[idx] ? '#6EE7B7' : '#FCA5A5'}">
            ${answered[idx] ? '✓ Угадал' : '✗ Не угадал'} · счёт: ${score}/${idx+1} · жми «Дальше»
          </div>` : `
          <div class="score-buttons">
            <button class="score-btn score-yes" onclick="vote(true,event)">✓ Угадал</button>
            <button class="score-btn score-no"  onclick="vote(false,event)">✗ Не угадал</button>
          </div>`}
      </div>
    </div>`;
}

function handleCardTap() {
  if (!flipped) {
    flipped = true;
    document.getElementById('card').classList.add('flipped');
  }
}

function vote(yes, e) {
  e.stopPropagation();
  const idx = cur - IDX_SCORED_START;
  if (answered[idx] !== null) return;
  answered[idx] = yes;
  if (yes) score++;
  renderScored(SCORED[idx]);
  document.getElementById('card').classList.add('flipped');
  flipped = true;
  document.getElementById('nextBtn').disabled = false;
}

function next() {
  if (cur < TOTAL - 1) {
    cur++;
    render('next');
  } else {
    showDone();
  }
}

function prev() {
  if (cur > 0) { cur--; render('prev'); }
}

function showDone() {
  const total = SCORED.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('scoreRing').style.setProperty('--pct', pct + '%');
  document.getElementById('scoreNum').innerHTML = `${score}<span>/${total}</span>`;

  let title, sub;
  if (pct >= 80) {
    title = 'Отличный переводчик!';
    sub = `<span class="done-hi">Угадал ${score} из ${total}.</span> Похоже, ты уже умеешь думать как человек в поле — а не как интегратор. Самое время в гильдию.`;
  } else if (pct >= 50) {
    title = 'Неплохо!';
    sub = `<span class="done-hi">${score} из ${total}</span> — больше половины. Разрыв между языком технологий и языком людей оказался неожиданным? Именно это мы и исследуем.`;
  } else {
    title = 'Разрыв реален.';
    sub = `<span class="done-lo">${score} из ${total}.</span> Этот разрыв — не проблема знаний. Это системный барьер между интеграторами и теми, кто должен AI использовать. Именно им занимается гильдия.`;
  }

  document.getElementById('doneTitle').textContent = title;
  document.getElementById('doneSub').innerHTML = sub;
  document.getElementById('doneScreen').classList.add('visible');
}

function restart() {
  cur = 0; score = 0; flipped = false;
  answered = new Array(SCORED.length).fill(null);
  document.getElementById('doneScreen').classList.remove('visible');
  render(null);
}

// Swipe
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 55) {
    if (cur >= IDX_GENERAL_START) return; // no swipe on game cards
    dx < 0 ? next() : prev();
  }
}, {passive:true});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key === "Enter") { if (cur >= IDX_GENERAL_START && !flipped) handleCardTap(); }
});

render(null);
</script>
